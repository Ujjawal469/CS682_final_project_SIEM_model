<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini SIEM — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent-glow: rgba(88,166,255,.25);
      --text:      #e6edf3;
      --muted:     #8b949e;
      --danger:    #f85149;
      --success:   #3fb950;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(88,166,255,.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(63,185,80,.04) 0%, transparent 60%);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(0,0,0,.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .logo .shield { font-size: 3rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 700; margin-top: .4rem; color: var(--text); }
    .logo p  { font-size: .8rem; color: var(--muted); margin-top: .2rem; }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    .field input {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: .5rem;
      transition: opacity .2s, transform .1s;
    }
    .btn-login:hover   { opacity: .9; }
    .btn-login:active  { transform: scale(.98); }

    .error {
      background: rgba(248,81,73,.12);
      border: 1px solid rgba(248,81,73,.4);
      border-radius: 8px;
      padding: .7rem 1rem;
      font-size: .85rem;
      color: var(--danger);
      margin-bottom: 1.1rem;
    }

    .accounts {
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }
    .accounts p { font-size: .75rem; color: var(--muted); margin-bottom: .6rem; text-align: center; }
    .account-list { display: flex; flex-direction: column; gap: .35rem; }
    .account-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .45rem .75rem;
      font-size: .78rem;
      cursor: pointer;
      transition: border-color .15s;
    }
    .account-item:hover { border-color: var(--accent); }
    .acct-left { display: flex; align-items: center; gap: .5rem; }
    .role-badge {
      padding: .15rem .45rem;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-admin   { background: rgba(231,76,60,.18); color: #e74c3c; }
    .badge-analyst { background: rgba(52,152,219,.18); color: #3498db; }
    .badge-auditor { background: rgba(46,204,113,.18); color: #2ecc71; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="shield">🛡️</div>
      <h1>Mini SIEM</h1>
      <p>Role-Based Access Control Portal</p>
    </div>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input id="username" name="username" type="text" placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
      </div>
      <button class="btn-login" type="submit">Sign In</button>
    </form>

    <div class="accounts">
      <p>Demo accounts (click to fill)</p>
      <div class="account-list">
        <div class="account-item" onclick="fill('admin','admin123')">
          <div class="acct-left">🔑 <span>admin</span></div>
          <span class="role-badge badge-admin">Admin</span>
        </div>
        <div class="account-item" onclick="fill('analyst','analyst123')">
          <div class="acct-left">🔍 <span>analyst</span></div>
          <span class="role-badge badge-analyst">Analyst</span>
        </div>
        <div class="account-item" onclick="fill('auditor','auditor123')">
          <div class="acct-left">📋 <span>auditor</span></div>
          <span class="role-badge badge-auditor">Auditor</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function fill(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
    }
  </script>
</body>
</html>
