input {
  beats {
    port => 5044
  }
}

filter {

  # ── 1. PARSE HEADER: timestamp + host + service + pid + message ─────────────
  grok {
    match => {
      "message" => "%{YEAR:log_year} %{MONTH:log_month} %{MONTHDAY:log_day} %{TIME:log_time} %{HOSTNAME:log_host} %{WORD:service}\[%{NUMBER:pid}\]: %{GREEDYDATA:auth_message}"
    }
    tag_on_failure => ["_grok_header_fail"]
  }

  # ── 2. PARSE TIMESTAMP → @timestamp ────────────────────────────────────────
  mutate {
    add_field => { "full_timestamp" => "%{log_year} %{log_month} %{log_day} %{log_time}" }
  }
  date {
    match    => ["full_timestamp", "yyyy MMM dd HH:mm:ss"]
    target   => "@timestamp"
    timezone => "Asia/Kolkata"
  }

  # ── 3. PARSE SSH AUTH LINES ─────────────────────────────────────────────────
  grok {
    match => {
      "auth_message" => [
        "Accepted password for %{USERNAME:username} from %{IPORHOST:source_ip} port %{NUMBER:port} %{WORD:ssh_protocol}",
        "Failed password for invalid user %{USERNAME:username} from %{IPORHOST:source_ip} port %{NUMBER:port} %{WORD:ssh_protocol}",
        "Failed password for %{USERNAME:username} from %{IPORHOST:source_ip} port %{NUMBER:port} %{WORD:ssh_protocol}",
        "Disconnected from user %{USERNAME:username} %{IPORHOST:source_ip} port %{NUMBER:port}",
        "Connection closed by %{IPORHOST:source_ip} port %{NUMBER:port}"
      ]
    }
    tag_on_failure => ["_grok_auth_fail"]
  }

  # ── 4. SET event_type AND login_status ──────────────────────────────────────
  if "Accepted password" in [auth_message] {
    mutate {
      add_field => {
        "event_type"   => "successful_login"
        "login_status" => "success"
      }
    }
  } else if "Failed password" in [auth_message] {
    mutate {
      add_field => {
        "event_type"   => "failed_login"
        "login_status" => "failure"
      }
    }
  } else if "Disconnected from user" in [auth_message] {
    mutate {
      add_field => {
        "event_type"   => "session_closed"
        "login_status" => "info"
      }
    }
  } else if "Connection closed" in [auth_message] {
    mutate {
      add_field => {
        "event_type"   => "connection_closed"
        "login_status" => "info"
      }
    }
  } else {
    mutate {
      add_field => {
        "event_type"   => "other"
        "login_status" => "unknown"
      }
    }
  }

  # ── 5. INVALID USER FLAG ────────────────────────────────────────────────────
  if "invalid user" in [auth_message] {
    mutate { add_field => { "invalid_user_attempt" => "true" } }
  } else {
    mutate { add_field => { "invalid_user_attempt" => "false" } }
  }

  # ── 6. GEOIP ────────────────────────────────────────────────────────────────
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
    }
    mutate {
      rename => { "[geoip][geo][location]" => "location" }
    }
  }

  # ── 7. SUBNET ───────────────────────────────────────────────────────────────
  if [source_ip] =~ /^\d+\.\d+\.\d+\.\d+$/ {
    ruby {
      code => '
        ip = event.get("source_ip")
        if ip
          parts = ip.split(".")
          event.set("subnet_24", parts[0..2].join(".") + ".0/24")
        end
      '
    }
  }

  # ── 8. SEVERITY SCORE ───────────────────────────────────────────────────────
  mutate { add_field => { "severity_score" => "1" } }

  if [login_status] == "failure" {
    mutate { replace => { "severity_score" => "3" } }
  }
  if [invalid_user_attempt] == "true" {
    mutate { replace => { "severity_score" => "5" } }
  }
  if [username] == "root" or [username] == "admin" {
    mutate { replace => { "severity_score" => "7" } }
  }
  if [invalid_user_attempt] == "true" and [login_status] == "failure" {
    mutate { replace => { "severity_score" => "8" } }
  }

  # ── 9. CONVERT TYPES ────────────────────────────────────────────────────────
  mutate {
    convert => {
      "port"           => "integer"
      "severity_score" => "integer"
    }
    remove_field => [
      "log_year","log_month","log_day","log_time",
      "full_timestamp","message","host"
    ]
  }

}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "auth-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}