input {
  beats {
    port => 5044
  }
}

filter {

  # ── Parse timestamp + host header ──────────────────────────────────────────
  grok {
    match => {
      "message" => [
        "%{YEAR:log_year} %{MONTH:log_month} %{MONTHDAY:log_day} %{TIME:log_time} %{HOSTNAME:host} %{WORD:service}\[%{NUMBER:pid}\]: %{GREEDYDATA:auth_message}"
      ]
    }
  }

  mutate {
    add_field => { "full_timestamp" => "%{log_year} %{log_month} %{log_day} %{log_time}" }
  }

  date {
    match => ["full_timestamp", "yyyy MMM dd HH:mm:ss"]
    target => "@timestamp"
  }

  # ── Parse SSH auth event ────────────────────────────────────────────────────
  grok {
    match => {
      "auth_message" => [
        "Accepted password for %{USERNAME:username} from %{IPORHOST:source_ip} port %{NUMBER:port} %{WORD:ssh_protocol}",
        "Failed password for %{USERNAME:username} from %{IPORHOST:source_ip} port %{NUMBER:port} %{WORD:ssh_protocol}",
        "Failed password for invalid user %{USERNAME:username} from %{IPORHOST:source_ip} port %{NUMBER:port} %{WORD:ssh_protocol}"
      ]
    }
  }

  # ── Login status ────────────────────────────────────────────────────────────
  if "Accepted password" in [auth_message] {
    mutate {
      add_field => { "event_type"   => "successful_login" }
      add_field => { "login_status" => "success" }
    }
  } else if "Failed password" in [auth_message] {
    mutate {
      add_field => { "event_type"   => "failed_login" }
      add_field => { "login_status" => "failure" }
    }
  }

  # ── Invalid user flag ───────────────────────────────────────────────────────
  if "invalid user" in [auth_message] {
    mutate { add_field => { "invalid_user_attempt" => "true" } }
  } else {
    mutate { add_field => { "invalid_user_attempt" => "false" } }
  }

  # ── GeoIP — NO fields list, exactly like your working original ──────────────
  geoip {
    source => "source_ip"
    target => "geoip"
  }

  mutate {
    rename => { "[geoip][location]" => "location" }
  }

  # ── Subnet extraction (Feature 4) ───────────────────────────────────────────
  if [source_ip] =~ /^\d+\.\d+\.\d+\.\d+$/ {
    ruby {
      code => '
        ip = event.get("source_ip")
        if ip
          parts = ip.split(".")
          event.set("subnet_24", parts[0..2].join(".") + ".0/24")
          event.set("subnet_16", parts[0..1].join(".") + ".0.0/16")
        end
      '
    }
  }

  # ── Severity scoring (Feature 5) ────────────────────────────────────────────
  mutate { add_field => { "severity_score" => "1" } }

  if [login_status] == "failure" {
    mutate { replace => { "severity_score" => "3" } }
  }
  if [invalid_user_attempt] == "true" {
    mutate { replace => { "severity_score" => "5" } }
  }
  if [username] == "root" or [username] == "admin" {
    mutate { replace => { "severity_score" => "7" } }
  }
  if [invalid_user_attempt] == "true" and [login_status] == "failure" {
    mutate { replace => { "severity_score" => "8" } }
  }

  # ── Convert types ───────────────────────────────────────────────────────────
  mutate {
    convert => {
      "port"           => "integer"
      "severity_score" => "integer"
    }
  }

}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "auth-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}